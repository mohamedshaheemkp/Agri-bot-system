<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agri AI - Disease Detection</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .detect-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .upload-area {
            border: 2px dashed #4CAF50;
            padding: 40px;
            border-radius: 8px;
            margin: 20px 0;
            background: #fdfdfd;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-area:hover {
            background: #f1f8f1;
            border-color: #2e7d32;
        }

        .upload-area i {
            font-size: 48px;
            color: #4CAF50;
            margin-bottom: 15px;
        }

        .custom-file-input {
            display: none;
        }

        .btn-detect {
            background: #1b5e20;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .btn-detect:hover {
            background: #2e7d32;
        }

        #preview-container {
            margin-top: 20px;
            display: none;
        }

        #preview {
            max-width: 100%;
            max-height: 400px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .result-box {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            text-align: left;
            display: none;
        }

        .result-success {
            background: #e8f5e9;
            border-left: 5px solid #4CAF50;
        }

        .result-warning {
            background: #fff3e0;
            border-left: 5px solid #ff9800;
        }

        .disease-explanation {
            margin-top: 15px;
            line-height: 1.6;
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- Sidebar (matching index.html) -->
        <div class="sidebar">
            <h2>🌱 Agri AI</h2>
            <ul>
                <li onclick="window.location.href='index.html'">
                    <i class="fa fa-home"></i> Dashboard
                </li>
                <li class="active" style="background:#2e7d32;">
                    <i class="fa fa-leaf"></i> Disease Detection
                </li>
                <li onclick="window.location.href='index.html#camera'">
                    <i class="fa fa-camera"></i> Live Camera
                </li>
                <li onclick="window.location.href='chatbot.html'">
                    <i class="fa fa-robot"></i> AI Chatbot
                </li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main">
            <div class="detect-container">
                <h2><i class="fa fa-microscope"></i> Plant Disease Detection</h2>
                <p>Upload a clear photo of your plant leaf to get an instant AI diagnosis.</p>

                <label class="upload-area" for="imageUpload">
                    <i class="fa fa-cloud-upload-alt"></i>
                    <h3>Click here to upload an image</h3>
                    <p>Supports JPG, PNG, JPEG</p>
                    <input type="file" id="imageUpload" class="custom-file-input" accept="image/*">
                </label>

                <div id="preview-container">
                    <img id="preview" src="" alt="Image preview">
                </div>

                <button class="btn-detect" onclick="detectDisease()" id="detectBtn" style="display:none;">
                    <i class="fa fa-search"></i> Analyze Image
                </button>

                <!-- Results Section -->
                <div id="resultBox" class="result-box">
                    <h3 id="resultTitle"></h3>
                    <div class="disease-explanation" id="resultExplanation"></div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Image Preview Logic
        document.getElementById("imageUpload").addEventListener("change", function (e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    document.getElementById("preview").src = e.target.result;
                    document.getElementById("preview-container").style.display = "block";
                    document.getElementById("detectBtn").style.display = "inline-block";
                    document.getElementById("resultBox").style.display = "none";
                }
                reader.readAsDataURL(file);
            }
        });

        // Detection Logic mapped to your backend
        async function detectDisease() {
            const fileInput = document.getElementById("imageUpload");
            if (!fileInput.files[0]) return;

            const btn = document.getElementById("detectBtn");
            btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Analyzing...';
            btn.disabled = true;

            const formData = new FormData();
            formData.append("file", fileInput.files[0]);

            try {
                // Using your FastAPI endpoint from api_demo.py
                const res = await fetch("http://127.0.0.1:8000/detect", {
                    method: "POST",
                    body: formData
                });

                if (!res.ok) throw new Error("Server response was not ok");

                const data = await res.json();
                displayResults(data.detections);

            } catch (error) {
                console.error("Error:", error);
                const resultBox = document.getElementById("resultBox");
                resultBox.className = "result-box result-warning";
                resultBox.style.display = "block";
                document.getElementById("resultTitle").innerHTML = "<i class=\"fa fa-exclamation-triangle\"></i> Error Analyzing Image";
                document.getElementById("resultExplanation").innerText = "Could not connect to the detection server. Is the FastAPI backend running?";
            } finally {
                btn.innerHTML = '<i class="fa fa-search"></i> Analyze Image';
                btn.disabled = false;
            }
        }

        function displayResults(detections) {
            const resultBox = document.getElementById("resultBox");
            const title = document.getElementById("resultTitle");
            const explanation = document.getElementById("resultExplanation");

            resultBox.style.display = "block";

            if (!detections || detections.length === 0) {
                resultBox.className = "result-box result-success";
                title.innerHTML = "<i class=\"fa fa-check-circle\"></i> No issues detected!";
                explanation.innerHTML = "<p>The AI didn't find any known diseases in this image. The plant looks healthy.</p>";
                return;
            }

            // Display the most confident detection
            const primaryIssue = detections.reduce((prev, current) => (prev.confidence > current.confidence) ? prev : current);

            resultBox.className = "result-box result-warning";
            title.innerHTML = `<i class="fa fa-exclamation-circle"></i> Detected: <b>${primaryIssue.disease}</b> (${(primaryIssue.confidence * 100).toFixed(1)}% match)`;

            // Use the Gemini explanation generated by your backend
            let formattedExplanation = primaryIssue.explanation || "No detailed explanation available.";
            // Simple markdown to HTML conversion for the Gemini text
            formattedExplanation = formattedExplanation.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            formattedExplanation = formattedExplanation.replace(/\n\n/g, '</p><p>');
            formattedExplanation = formattedExplanation.replace(/\* (.*?)\n/g, '<li>$1</li>');

            explanation.innerHTML = `<p>${formattedExplanation}</p>`;
        }
    </script>

</body>

</html>
